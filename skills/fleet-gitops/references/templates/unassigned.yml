# fleets/unassigned.yml — Configuration for hosts not assigned to any fleet
# Replaces the deprecated no-team.yml (v4.82+)
# Supports policies with automations (install_software, run_script)
#
# NOTE: reports, agent_options, and labels are NOT supported in unassigned.yml.
# See references/scope-rules.md for what keys are valid here.

name: Unassigned

settings:
  features:
    enable_host_users: true
    enable_software_inventory: true

controls:
  scripts: []
  macos_settings:
    custom_settings: []
  windows_settings:
    custom_settings: []

policies:

software:
